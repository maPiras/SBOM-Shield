<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1E88E5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="#f0f8ff"/>
  <rect width="1440" height="900" fill="url(#g1)"/>
  <rect width="1440" height="900" fill="url(#g2)"/>
  <rect width="1440" height="900" fill="url(#g3)"/>

  <!-- subtle grid -->
  <g stroke="#1A237E" stroke-opacity="0.04" stroke-width="1">
    <line x1="0"    y1="150" x2="1440" y2="150"/>
    <line x1="0"    y1="300" x2="1440" y2="300"/>
    <line x1="0"    y1="450" x2="1440" y2="450"/>
    <line x1="0"    y1="600" x2="1440" y2="600"/>
    <line x1="0"    y1="750" x2="1440" y2="750"/>
    <line x1="240"  y1="0"   x2="240"  y2="900"/>
    <line x1="480"  y1="0"   x2="480"  y2="900"/>
    <line x1="720"  y1="0"   x2="720"  y2="900"/>
    <line x1="960"  y1="0"   x2="960"  y2="900"/>
    <line x1="1200" y1="0"   x2="1200" y2="900"/>
  </g>

  <!-- floating circles -->
  <circle cx="120"  cy="160" r="180" fill="#1E88E5" fill-opacity="0.05"/>
  <circle cx="1320" cy="720" r="220" fill="#1565C0" fill-opacity="0.06"/>
  <circle cx="900"  cy="80"  r="120" fill="#42A5F5" fill-opacity="0.07"/>
  <circle cx="300"  cy="800" r="100" fill="#1E88E5" fill-opacity="0.05"/>

  <!-- thin decorative arcs -->
  <circle cx="720" cy="450" r="340" fill="none" stroke="#1E88E5" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="720" cy="450" r="500" fill="none" stroke="#1E88E5" stroke-opacity="0.03" stroke-width="1"/>
</svg>
