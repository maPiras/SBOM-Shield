<svg viewBox="0 0 320 80" width="320" height="80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Intecs — the brainware company">
  <!-- icon: dot + figure (stylised i) -->
  <circle cx="20" cy="10" r="9" fill="#1E88E5"/>
  <!-- figure: two stacked rounded lobes -->
  <ellipse cx="14" cy="46" rx="12" ry="24" fill="#1565C0"/>
  <ellipse cx="26" cy="46" rx="12" ry="24" fill="#1E88E5"/>
  <!-- intecs wordmark -->
  <text x="54" y="52"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="38"
        fill="#1A237E"
        letter-spacing="-0.5">intecs</text>
  <!-- tagline -->
  <text x="56" y="68"
        font-family="Arial, sans-serif"
        font-size="13"
        fill="#1E88E5"
        letter-spacing="0.4">the brainware company</text>
</svg>
